name: photo_journal
description: A personal photo journal app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera / image picker
  image_picker: ^1.0.7

  # Local notifications
  flutter_local_notifications: ^17.1.2

  # Firebase analytics
  firebase_core: ^2.27.1
  firebase_analytics: ^10.8.9

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
